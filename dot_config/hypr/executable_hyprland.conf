# --- Monitor & General ---
monitor=,preferred,auto,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto
workspace = 1, monitor:DP-2, default:true
workspace = 2, monitor:DP-2
workspace = 3, monitor:DP-2
workspace = 4, monitor:DP-2
workspace = 5, monitor:DP-2

input {
    kb_layout = us
    follow_mouse = 0
    float_switch_override_focus = 0
    sensitivity = 0 # Raw input, like turning off mouse accel in StarCraft
}

cursor {
    no_warps = true
}

dwindle {
    preserve_split = true
}

# 1. Top Monitor (HDMI-A-1)
monitor = HDMI-A-1, 2560x1440@60, 300x0, 1

# 2. Main Ultrawide (DP-2) - Starts at Y=1440
monitor = DP-2, 3440x1440@144, 0x1440, 1

# 3. Right 4K (DP-1) - Vertically Centered
monitor = DP-1, 3840x2160@60, 3440x1296, 1.25


# --- The "Hacker" Aesthetic ---
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2

    # Cyan/Green active border for that "terminal" feel
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = hy3
}


decoration {
    rounding = 3   # Sharp corners = faster visual scan
    dim_inactive = false
    dim_strength = 0.4
    blur {
        enabled = true
        size = 3
        passes = 1
    }
}

# --- Startup Apps ---
# Parramatta, Australia Coordinates (Lat: -33.8, Lon: 151.0)
# Temperature: 6500K (Day) -> 3500K (Night)
# exec-once = gammastep -l -33.8:151.0 -t 6500:3500
exec-once = hyprpaper
exec-once = hyprpm reload -n
exec-once = vicinae server
# exec-once = ~/.config/hypr/nightlight.sh
exec-once = wlsunset -l -33.87 -L 151.21 -t 3500 -T 6500
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = ~/.local/bin/scratchpad-autohide.sh lite-xl ghostty-drop ytmusic chrome-drop
exec-once = [workspace 1] ghostty
exec-once = [workspace 1] google-chrome-stable

# --- Plugins ---
plugin {
    hy3 {
        tabs {
            height = 15
            padding = 5
            render_text = true
        }
        autotile {
            enable = true
        }
    }
}

# --- Window Rules ---
windowrule = float on, match:class (com.lite_xl.LiteXL)
windowrule = float on, match:title (ghostty-drop)
windowrule = float on, match:class ([Tt]hunar), match:title negative:(.*[Tt]hunar.*)
windowrule = center on, match:class ([Tt]hunar), match:title negative:(.*[Tt]hunar.*)

# --- Animations (Speed > Flash) ---
animations {
    enabled = yes
    bezier = fastBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 2, fastBezier
    animation = workspaces, 1, 2, default
    animation = specialWorkspace, 1, 3, fastBezier, slidefadevert -50%
}


# --- Keybindings ---
$mainMod = SUPER

# Tools
bind = $mainMod, RETURN, exec, ghostty
bind = $mainMod, SPACE, exec, vicinae toggle
bind = $mainMod CTRL, L, exec, hyprlock
bind = , F6, exec, ~/.local/bin/toggle-scratchpad.sh chrome-drop 1800 1100 --class google-chrome --singleton google-chrome-stable --new-window
bind = , F7, exec, ~/.local/bin/toggle-scratchpad.sh ytmusic 1400 900 --class "YouTube Music Desktop App" youtube-music-desktop-app
bind = , F9, exec, ~/.local/bin/toggle-scratchpad.sh ghostty-drop 1600 1000 920 1440 ghostty --title=ghostty-drop
bind = $mainMod SHIFT, S, exec, hyprshot -m region --clipboard-only
bind = CTRL SHIFT, V, exec, ~/.config/hypr/clip2path

# Move Focus (hy3)
bind = $mainMod, left, hy3:movefocus, l
bind = $mainMod, right, hy3:movefocus, r
bind = $mainMod, up, hy3:movefocus, u
bind = $mainMod, down, hy3:movefocus, d

# Move Window (hy3, falls back to cross-monitor at edges)
bind = $mainMod CTRL, left, exec, ~/.config/hypr/hy3-movewindow.sh l
bind = $mainMod CTRL, right, exec, ~/.config/hypr/hy3-movewindow.sh r
bind = $mainMod CTRL, up, exec, ~/.config/hypr/hy3-movewindow.sh u
bind = $mainMod CTRL, down, exec, ~/.config/hypr/hy3-movewindow.sh d

# bind = $mainMod CTRL, left, hy3:movewindow, l, once
# bind = $mainMod CTRL, right, hy3:movewindow, r, once
# bind = $mainMod CTRL, up, hy3:movewindow, u, once
# bind = $mainMod CTRL, down, hy3:movewindow, d, once

# Move Window (once - swap within group)
bind = $mainMod ALT, left, hy3:movewindow, l, once
bind = $mainMod ALT, right, hy3:movewindow, r, once
bind = $mainMod ALT, up, hy3:movewindow, u, once
bind = $mainMod ALT, down, hy3:movewindow, d, once

# Move window to prev/next monitor
bind = $mainMod CTRL, Prior, movewindow, mon:l
bind = $mainMod CTRL, Next, movewindow, mon:r

# Float center toggle with dim
bind = $mainMod CTRL, end, exec, ~/.local/bin/toggle-float-center.sh

# Mouse move/resize
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Toggle split direction (hy3)
bind = $mainMod, comma, hy3:changegroup, opposite
bind = $mainMod, slash, hy3:changegroup, opposite

# hy3: Tab Groups
bind = $mainMod, T, hy3:makegroup, tab
bind = $mainMod SHIFT, T, hy3:changegroup, toggletab
bind = $mainMod, bracketleft, hy3:focustab, l, wrap
bind = $mainMod, bracketright, hy3:focustab, r, wrap

# hy3: Manual Grouping (i3-style splits)
bind = $mainMod, H, hy3:makegroup, h
bind = $mainMod, Y, hy3:makegroup, v
bind = $mainMod SHIFT, H, hy3:changegroup, h
bind = $mainMod SHIFT, Y, hy3:changegroup, v

# hy3: Focus Hierarchy (navigate node tree)
bind = $mainMod, A, hy3:changefocus, raise
bind = $mainMod SHIFT, A, hy3:changefocus, lower

# hy3: Equalize window sizes
bind = $mainMod CTRL, 0, hy3:equalize, workspace

# Resize
binde = $mainMod CTRL SHIFT, right, resizeactive, 50 0
binde = $mainMod CTRL SHIFT, left, resizeactive, -50 0
binde = $mainMod CTRL SHIFT, down, resizeactive, 0 50
binde = $mainMod CTRL SHIFT, up, resizeactive, 0 -50
binde = $mainMod CTRL, equal, resizeactive, 50 50
binde = $mainMod CTRL, minus, resizeactive, -50 -50

# Window State
bind = $mainMod, Q, hy3:killactive
bind = ALT, F4, hy3:killactive
bind = CTRL, Escape, hy3:killactive
bind = $mainMod, Escape, hy3:killactive
bind = $mainMod, F, fullscreen

bind = ALT, N, exec, ~/.local/bin/toggle-scratchpad.sh lite-xl 1400 900 --class com.lite_xl.LiteXL lite-xl
bind = $mainMod, grave, workspace, previous

# Workspace Switching (1-5)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# Move Window to Workspace (hy3 - moves entire node/group)
bind = $mainMod CTRL, 1, hy3:movetoworkspace, 1
bind = $mainMod CTRL, 2, hy3:movetoworkspace, 2
bind = $mainMod CTRL, 3, hy3:movetoworkspace, 3
bind = $mainMod CTRL, 4, hy3:movetoworkspace, 4
bind = $mainMod CTRL, 5, hy3:movetoworkspace, 5
